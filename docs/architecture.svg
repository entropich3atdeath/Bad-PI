<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>autoresearch-meta coordination architecture</title>
  <desc>Three-tier diagram: global meta-agent at top coordinates through a shared experiment store with 1000 worker agents at bottom</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555555; }
      .th-p { font-size: 14px; font-weight: 500; fill: #26215C; }
      .ts-p { font-size: 12px; font-weight: 400; fill: #534AB7; }
      .th-t { font-size: 14px; font-weight: 500; fill: #085041; }
      .ts-t { font-size: 12px; font-weight: 400; fill: #0F6E56; }
      .th-c { font-size: 14px; font-weight: 500; fill: #4A1B0C; }
      .ts-c { font-size: 12px; font-weight: 400; fill: #993C1D; }
      .th-a { font-size: 14px; font-weight: 500; fill: #412402; }
      .ts-a { font-size: 12px; font-weight: 400; fill: #854F0B; }
      .th-b { font-size: 14px; font-weight: 500; fill: #042C53; }
      .ts-b { font-size: 12px; font-weight: 400; fill: #185FA5; }
      .th-g { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .ts-g { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    </style>
  </defs>

  <!-- Meta-agent dashed container -->
  <rect x="40" y="28" width="600" height="140" rx="16" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central" class="th">Global meta-agent</text>

  <!-- Sub1: Search strategy (purple) -->
  <rect x="52" y="62" width="128" height="72" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="116" y="87" text-anchor="middle" dominant-baseline="central" class="th-p">Search strategy</text>
  <text x="116" y="109" text-anchor="middle" dominant-baseline="central" class="ts-p">Bandit + BO</text>

  <!-- Sub2: Dim. eliminator (coral) -->
  <rect x="200" y="62" width="128" height="72" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="264" y="87" text-anchor="middle" dominant-baseline="central" class="th-c">Dim. eliminator</text>
  <text x="264" y="109" text-anchor="middle" dominant-baseline="central" class="ts-c">fANOVA pruning</text>

  <!-- Sub3: Config proposer (teal) -->
  <rect x="348" y="62" width="128" height="72" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="412" y="87" text-anchor="middle" dominant-baseline="central" class="th-t">Config proposer</text>
  <text x="412" y="109" text-anchor="middle" dominant-baseline="central" class="ts-t">Proposes next run</text>

  <!-- Sub4: Report writer (amber) -->
  <rect x="496" y="62" width="128" height="72" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="560" y="87" text-anchor="middle" dominant-baseline="central" class="th-a">Report writer</text>
  <text x="560" y="109" text-anchor="middle" dominant-baseline="central" class="ts-a">Syncs program.md</text>

  <!-- Shared store (blue) -->
  <rect x="140" y="228" width="400" height="62" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="251" text-anchor="middle" dominant-baseline="central" class="th-b">Shared experiment store</text>
  <text x="340" y="273" text-anchor="middle" dominant-baseline="central" class="ts-b">results · configs · program.md · dim. scores</text>

  <!-- Workers (gray) -->
  <rect x="60" y="370" width="90" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="105" y="389" text-anchor="middle" dominant-baseline="central" class="th-g">Worker 1</text>
  <text x="105" y="409" text-anchor="middle" dominant-baseline="central" class="ts-g">5-min loop</text>

  <rect x="168" y="370" width="90" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="213" y="389" text-anchor="middle" dominant-baseline="central" class="th-g">Worker 2</text>
  <text x="213" y="409" text-anchor="middle" dominant-baseline="central" class="ts-g">5-min loop</text>

  <rect x="276" y="370" width="90" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="321" y="389" text-anchor="middle" dominant-baseline="central" class="th-g">Worker 3</text>
  <text x="321" y="409" text-anchor="middle" dominant-baseline="central" class="ts-g">5-min loop</text>

  <rect x="384" y="370" width="90" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="429" y="389" text-anchor="middle" dominant-baseline="central" class="th-g">Worker 4</text>
  <text x="429" y="409" text-anchor="middle" dominant-baseline="central" class="ts-g">5-min loop</text>

  <text x="504" y="396" text-anchor="middle" dominant-baseline="central" class="th-g">···</text>
  <text x="548" y="396" text-anchor="start" dominant-baseline="central" class="ts-g">996 more</text>

  <!-- Arrows: meta ↔ store -->
  <line x1="370" y1="168" x2="370" y2="228" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="310" y1="228" x2="310" y2="168" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="298" y="201" text-anchor="end" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#555">aggregates</text>
  <text x="382" y="201" text-anchor="start" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#555">configs / program.md</text>

  <!-- Arrows: store ↔ workers -->
  <line x1="400" y1="290" x2="400" y2="370" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="280" y1="370" x2="280" y2="290" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="268" y="332" text-anchor="end" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#555">push results</text>
  <text x="412" y="332" text-anchor="start" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#555">pull config</text>
</svg>
