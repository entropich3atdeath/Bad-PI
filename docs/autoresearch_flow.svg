<svg width="700" height="520" viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Autoresearch + Bad PI workflow</title>
  <desc>Diagram showing how Bad PI coordinates workers through program.md updates, experiment execution, and evidence aggregation.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .title { font-size: 16px; font-weight: 600; fill: #1a1a1a; }
      .label { font-size: 13px; font-weight: 500; fill: #1a1a1a; }
      .note { font-size: 11px; fill: #555555; }
      .meta { fill: #E3F2FD; stroke: #0288D1; stroke-width: 1.2; }
      .component { fill: #E8F1FF; stroke: #1E88E5; stroke-width: 0.8; }
      .store { fill: #E8F5E9; stroke: #2E7D32; stroke-width: 1; }
      .worker { fill: #FFF8E1; stroke: #F9A825; stroke-width: 0.8; }
      .action { fill: #F3E5F5; stroke: #6A1B9A; stroke-width: 0.8; }
      .step { fill: #FFEBEE; stroke: #C62828; stroke-width: 0.8; }
      .connector { stroke: #374151; stroke-width: 1.4; }
      .hint { font-size: 12px; fill: #424242; }
    </style>
  </defs>

  <rect x="40" y="30" width="620" height="140" rx="18" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="350" y="50" text-anchor="middle" dominant-baseline="central" class="title">Bad PI coordinator</text>
  <rect x="88" y="72" width="152" height="72" rx="12" class="component"/>
  <text x="164" y="100" text-anchor="middle" dominant-baseline="central" class="label">Belief engine</text>
  <text x="164" y="118" text-anchor="middle" dominant-baseline="central" class="note">updates hypothesis posteriors</text>
  <rect x="272" y="72" width="152" height="72" rx="12" class="component"/>
  <text x="348" y="100" text-anchor="middle" dominant-baseline="central" class="label">Hypothesis registry</text>
  <text x="348" y="118" text-anchor="middle" dominant-baseline="central" class="note">gates LLM proposals</text>
  <rect x="456" y="72" width="152" height="72" rx="12" class="component"/>
  <text x="532" y="100" text-anchor="middle" dominant-baseline="central" class="label">Program writer</text>
  <text x="532" y="118" text-anchor="middle" dominant-baseline="central" class="note">rewrites shared program.md</text>

  <rect x="220" y="210" width="260" height="70" rx="14" class="store"/>
  <text x="350" y="236" text-anchor="middle" dominant-baseline="central" class="label">Shared experiment store</text>
  <text x="350" y="255" text-anchor="middle" dominant-baseline="central" class="note">program.md · configs · results · hypothesis state</text>

  <rect x="60" y="340" width="110" height="66" rx="12" class="worker"/>
  <text x="115" y="372" text-anchor="middle" dominant-baseline="central" class="label">Worker 1</text>
  <text x="115" y="392" text-anchor="middle" dominant-baseline="central" class="note">5-minute experiment</text>
  <rect x="295" y="340" width="110" height="66" rx="12" class="worker"/>
  <text x="350" y="372" text-anchor="middle" dominant-baseline="central" class="label">Worker 2</text>
  <text x="350" y="392" text-anchor="middle" dominant-baseline="central" class="note">5-minute experiment</text>
  <rect x="530" y="340" width="110" height="66" rx="12" class="worker"/>
  <text x="585" y="372" text-anchor="middle" dominant-baseline="central" class="label">Worker N</text>
  <text x="585" y="392" text-anchor="middle" dominant-baseline="central" class="note">5-minute experiment</text>

  <line x1="164" y1="145" x2="164" y2="210" class="connector" marker-end="url(#arr)"/>
  <text x="130" y="175" class="hint">update beliefs</text>
  <line x1="348" y1="145" x2="348" y2="210" class="connector" marker-end="url(#arr)"/>
  <text x="314" y="175" class="hint">sync hypothesis state</text>
  <line x1="532" y1="145" x2="532" y2="210" class="connector" marker-end="url(#arr)"/>
  <text x="568" y="175" class="hint">publish program.md</text>

  <line x1="200" y1="245" x2="75" y2="345" class="connector" marker-end="url(#arr)"/>
  <text x="145" y="295" class="hint">worker pulls config</text>
  <line x1="320" y1="245" x2="350" y2="345" class="connector" marker-end="url(#arr)"/>
  <text x="343" y="295" class="hint">worker pulls config</text>
  <line x1="500" y1="245" x2="565" y2="345" class="connector" marker-end="url(#arr)"/>
  <text x="530" y="295" class="hint">worker pulls config</text>

  <line x1="115" y1="406" x2="115" y2="460" class="connector" marker-end="url(#arr)"/>
  <line x1="350" y1="406" x2="350" y2="460" class="connector" marker-end="url(#arr)"/>
  <line x1="585" y1="406" x2="585" y2="460" class="connector" marker-end="url(#arr)"/>
  <text x="115" y="475" text-anchor="middle" dominant-baseline="central" class="note">trained model & metrics</text>
  <text x="350" y="475" text-anchor="middle" dominant-baseline="central" class="note">trained model & metrics</text>
  <text x="585" y="475" text-anchor="middle" dominant-baseline="central" class="note">trained model & metrics</text>

  <line x1="115" y1="460" x2="350" y2="240" class="connector" marker-end="url(#arr)"/>
  <line x1="350" y1="460" x2="350" y2="240" class="connector" marker-end="url(#arr)"/>
  <line x1="585" y1="460" x2="500" y2="240" class="connector" marker-end="url(#arr)"/>
  <text x="295" y="355" class="hint">results</text>

  <rect x="435" y="390" width="180" height="90" rx="14" class="action"/>
  <text x="525" y="420" text-anchor="middle" dominant-baseline="central" class="label">LLM proposer</text>
  <text x="525" y="438" text-anchor="middle" dominant-baseline="central" class="note">suggests new hypotheses</text>
  <line x1="525" y1="390" x2="525" y2="220" class="connector" marker-end="url(#arr)"/>
  <text x="540" y="305" class="hint">structured proposals</text>

  <rect x="78" y="210" width="110" height="70" rx="14" class="step"/>
  <text x="133" y="238" text-anchor="middle" dominant-baseline="central" class="label">train.py / prepare.py</text>
  <text x="133" y="256" text-anchor="middle" dominant-baseline="central" class="note">5-min autoresearch run</text>
</svg>
