<svg width="680" height="278" viewBox="0 0 680 278" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Early stopping with progress buckets</title>
  <desc>Six concurrent runs as horizontal bars. At each 20% checkpoint, bottom P25 runs are killed, top P90 at completion are extended.</desc>
  <style>
    text { font-family: ui-sans-serif, system-ui, sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    .ts { font-size: 12px; fill: #555; }
  </style>
  <text class="ts" x="340" y="14" text-anchor="middle" dominant-baseline="central">progress →</text>
  <text class="ts" x="208" y="28" text-anchor="middle" dominant-baseline="central">p=0.2</text>
  <text class="ts" x="316" y="28" text-anchor="middle" dominant-baseline="central">p=0.4</text>
  <text class="ts" x="424" y="28" text-anchor="middle" dominant-baseline="central">p=0.6</text>
  <text class="ts" x="532" y="28" text-anchor="middle" dominant-baseline="central">p=0.8</text>
  <text class="ts" x="640" y="28" text-anchor="middle" dominant-baseline="central">done</text>
  <line x1="208" y1="36" x2="208" y2="207" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="316" y1="36" x2="316" y2="207" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="424" y1="36" x2="424" y2="207" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="532" y1="36" x2="532" y2="207" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="640" y1="36" x2="640" y2="207" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="ts" x="94" y="55"  text-anchor="end" dominant-baseline="central">W1</text>
  <text class="ts" x="94" y="82"  text-anchor="end" dominant-baseline="central">W2</text>
  <text class="ts" x="94" y="109" text-anchor="end" dominant-baseline="central">W3</text>
  <text class="ts" x="94" y="136" text-anchor="end" dominant-baseline="central">W4</text>
  <text class="ts" x="94" y="163" text-anchor="end" dominant-baseline="central">W5</text>
  <text class="ts" x="94" y="190" text-anchor="end" dominant-baseline="central">W6</text>
  <rect x="100" y="45" width="108" height="20" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <line x1="203" y1="50" x2="213" y2="60" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="213" y1="50" x2="203" y2="60" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round"/>
  <text class="ts" x="220" y="55" dominant-baseline="central" fill="#993C1D">killed (P8)</text>
  <rect x="100" y="72" width="216" height="20" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <line x1="311" y1="77" x2="321" y2="87" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="321" y1="77" x2="311" y2="87" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/>
  <text class="ts" x="328" y="82" dominant-baseline="central" fill="#854F0B">killed (P19)</text>
  <rect x="100" y="99"  width="540" height="20" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <rect x="100" y="126" width="540" height="20" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <rect x="100" y="153" width="540" height="20" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="640" y="153" width="28"  height="20" rx="4" fill="none"    stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="648" y1="157" x2="648" y2="169" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="642" y1="163" x2="654" y2="163" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
  <text class="ts" x="632" y="175" text-anchor="end" dominant-baseline="central" fill="#0F6E56">extended (P94)</text>
  <rect x="100" y="180" width="108" height="20" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <line x1="203" y1="185" x2="213" y2="195" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="213" y1="185" x2="203" y2="195" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round"/>
  <text class="ts" x="220" y="190" dominant-baseline="central" fill="#993C1D">killed (P6)</text>
  <circle cx="208" cy="109" r="3" fill="white" stroke="#888780" stroke-width="1"/>
  <circle cx="316" cy="109" r="3" fill="white" stroke="#888780" stroke-width="1"/>
  <circle cx="424" cy="109" r="3" fill="white" stroke="#888780" stroke-width="1"/>
  <circle cx="532" cy="109" r="3" fill="white" stroke="#888780" stroke-width="1"/>
  <circle cx="640" cy="109" r="3" fill="white" stroke="#888780" stroke-width="1"/>
  <circle cx="208" cy="136" r="3" fill="white" stroke="#888780" stroke-width="1"/>
  <circle cx="316" cy="136" r="3" fill="white" stroke="#888780" stroke-width="1"/>
  <circle cx="424" cy="136" r="3" fill="white" stroke="#888780" stroke-width="1"/>
  <circle cx="532" cy="136" r="3" fill="white" stroke="#888780" stroke-width="1"/>
  <circle cx="640" cy="136" r="3" fill="white" stroke="#888780" stroke-width="1"/>
  <circle cx="208" cy="163" r="3" fill="white" stroke="#1D9E75" stroke-width="1"/>
  <circle cx="316" cy="163" r="3" fill="white" stroke="#1D9E75" stroke-width="1"/>
  <circle cx="424" cy="163" r="3" fill="white" stroke="#1D9E75" stroke-width="1"/>
  <circle cx="532" cy="163" r="3" fill="white" stroke="#1D9E75" stroke-width="1"/>
  <circle cx="640" cy="163" r="3" fill="white" stroke="#1D9E75" stroke-width="1"/>
  <line x1="100" y1="210" x2="640" y2="210" stroke="#D3D1C7" stroke-width="0.5"/>
  <rect x="100" y="224" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="118" y="230" dominant-baseline="central">killed — below P25 at any checkpoint</text>
  <rect x="320" y="224" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ts" x="338" y="230" dominant-baseline="central">extended — above P90 at done</text>
  <rect x="100" y="248" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="ts" x="118" y="254" dominant-baseline="central">completed normally</text>
  <text class="ts" x="338" y="254" dominant-baseline="central">circles = metric reported at each checkpoint</text>
</svg>
