<svg width="680" height="284" viewBox="0 0 680 284" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Pipelined swarm with speculative execution</title>
  <desc>Three horizontal lanes. GPU workers run Batch N while meta-agent speculatively writes program N+1. Zero idle time at batch boundary. Flush path handles mispredictions.</desc>
  <style>
    text { font-family: ui-sans-serif, system-ui, sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    .ts { font-size: 12px; fill: #555; }
    .th-t { font-size: 14px; font-weight: 500; fill: #085041; }
    .ts-t { font-size: 12px; fill: #0F6E56; }
    .th-a { font-size: 14px; font-weight: 500; fill: #412402; }
    .ts-a { font-size: 12px; fill: #854F0B; }
  </style>
  <text class="ts" x="94" y="60"  text-anchor="end" dominant-baseline="central">GPU workers</text>
  <text class="ts" x="94" y="140" text-anchor="end" dominant-baseline="central">meta-agent</text>
  <text class="ts" x="94" y="214" text-anchor="end" dominant-baseline="central">program.md</text>
  <line x1="100" y1="98"  x2="640" y2="98"  stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="100" y1="176" x2="640" y2="176" stroke="#D3D1C7" stroke-width="0.5"/>
  <rect x="100" y="40" width="260" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th"   x="230" y="60" text-anchor="middle" dominant-baseline="central">Batch N running</text>
  <rect x="376" y="40" width="264" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-t" x="508" y="60" text-anchor="middle" dominant-baseline="central">Batch N+1 running</text>
  <rect x="168" y="120" width="100" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th"   x="218" y="140" text-anchor="middle" dominant-baseline="central">analyze N</text>
  <rect x="276" y="120" width="150" height="40" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th-a" x="351" y="134" text-anchor="middle" dominant-baseline="central">spec write N+1</text>
  <text class="ts-a" x="351" y="152" text-anchor="middle" dominant-baseline="central">while N still runs</text>
  <rect x="432" y="120" width="96" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text class="th"   x="480" y="134" text-anchor="middle" dominant-baseline="central">confirm</text>
  <text class="ts"   x="480" y="152" text-anchor="middle" dominant-baseline="central">or flush</text>
  <rect x="100" y="194" width="276" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th"   x="238" y="214" text-anchor="middle" dominant-baseline="central">N loaded</text>
  <rect x="284" y="194" width="100" height="40" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text class="th-a" x="334" y="208" text-anchor="middle" dominant-baseline="central">N+1 ready</text>
  <text class="ts-a" x="334" y="226" text-anchor="middle" dominant-baseline="central">speculative</text>
  <rect x="376" y="194" width="264" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-t" x="508" y="214" text-anchor="middle" dominant-baseline="central">N+1 active</text>
  <line x1="376" y1="36" x2="376" y2="238" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 2"/>
  <text class="ts" x="376" y="252" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">zero idle</text>
  <path d="M480 160 L480 186" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text class="ts" x="540" y="172" dominant-baseline="central" fill="#993C1D">flush → workers reload</text>
  <text class="ts" x="340" y="272" text-anchor="middle" dominant-baseline="central">time →</text>
</svg>
