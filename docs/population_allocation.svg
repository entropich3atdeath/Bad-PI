<svg width="680" height="475" viewBox="0 0 680 475" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>PI meta-agent: hypothesis-based population management with belief updating</title>
  <desc>Left column shows four hypotheses with posterior probabilities. Right column shows four worker populations sized proportionally by information value. Bottom shows the shared meta-hypothesis log.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .lbl { font-size: 12px; font-weight: 400; fill: #555555; }
    </style>
  </defs>

  <!-- Column headers -->
  <text x="122" y="22" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#555">Hypotheses + posteriors</text>
  <text x="537" y="22" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#555">Populations + worker allocation</text>

  <!-- H1: teal P=0.84 -->
  <rect x="30" y="35" width="185" height="65" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="122" y="57" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">Depth &gt; 10 optimal</text>
  <text x="122" y="81" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#0F6E56">posterior  P = 0.84</text>

  <!-- H2: amber P=0.51 -->
  <rect x="30" y="130" width="185" height="65" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="122" y="152" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#412402">LR × batch synergy</text>
  <text x="122" y="176" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#854F0B">posterior  P = 0.51</text>

  <!-- H3: coral P=0.12 -->
  <rect x="30" y="225" width="185" height="65" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="122" y="247" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">WINDOW matters</text>
  <text x="122" y="271" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#993C1D">posterior  P = 0.12</text>

  <!-- H4: purple P=0.28 -->
  <rect x="30" y="320" width="185" height="65" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="122" y="342" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#26215C">muon_lr ceiling?</text>
  <text x="122" y="366" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#534AB7">posterior  P = 0.28</text>

  <!-- Center arrows -->
  <line x1="215" y1="67"  x2="438" y2="67"  stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="215" y1="162" x2="438" y2="162" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="215" y1="257" x2="438" y2="257" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="215" y1="352" x2="438" y2="352" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Center label -->
  <text x="327" y="206" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#888">allocation ∝</text>
  <text x="327" y="221" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#888">uncertainty × importance</text>

  <!-- P1: teal, 50 workers -->
  <rect x="440" y="35" width="195" height="65" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="537" y="57" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">Pop A — Exploit</text>
  <text x="537" y="79" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#0F6E56">50 workers</text>
  <!-- P1 bar -->
  <rect x="440" y="105" width="195" height="10" rx="3" fill="#D3D1C7"/>
  <rect x="440" y="105" width="195" height="10" rx="3" fill="#1D9E75"/>

  <!-- P2: amber, 20 workers -->
  <rect x="440" y="130" width="195" height="65" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="537" y="152" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#412402">Pop B — Investigate</text>
  <text x="537" y="174" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#854F0B">20 workers</text>
  <!-- P2 bar -->
  <rect x="440" y="200" width="195" height="10" rx="3" fill="#D3D1C7"/>
  <rect x="440" y="200" width="78"  height="10" rx="3" fill="#EF9F27"/>

  <!-- P3: coral, 8 workers -->
  <rect x="440" y="225" width="195" height="65" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="537" y="247" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Pop C — Falsify</text>
  <text x="537" y="269" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#993C1D">8 workers · eliminate</text>
  <!-- P3 bar -->
  <rect x="440" y="295" width="195" height="10" rx="3" fill="#D3D1C7"/>
  <rect x="440" y="295" width="31"  height="10" rx="3" fill="#D85A30"/>

  <!-- P4: purple, 5 workers -->
  <rect x="440" y="320" width="195" height="65" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="537" y="342" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#26215C">Pop D — Moonshot</text>
  <text x="537" y="364" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#534AB7">5 workers · speculate</text>
  <!-- P4 bar -->
  <rect x="440" y="390" width="195" height="10" rx="3" fill="#D3D1C7"/>
  <rect x="440" y="390" width="19"  height="10" rx="3" fill="#7F77DD"/>

  <!-- Meta-hypothesis log (full width bottom) -->
  <rect x="30" y="418" width="605" height="42" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="332" y="432" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Meta-hypothesis log</text>
  <text x="332" y="450" text-anchor="middle" dominant-baseline="central" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#5F5E5A">checkpoints · eliminated hypotheses · new hypotheses · belief deltas — all timestamped</text>
</svg>
